name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * 1"

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # The brand logo lives in home-assistant/brands and is added when the
          # integration is published there; skip it until then.
          ignore: brands

  tests:
    name: Engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pytest
      - run: pytest tests/ -q

  card:
    name: Build card
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: card
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      # Fail if the committed bundle is stale versus the source.
      - name: Ensure committed bundle is up to date
        run: git diff --exit-code -- ../custom_components/goe_steve/www/goe-steve-card.js
