<svg xmlns="http://www.w3.org/2000/svg" width="700" height="248" viewBox="0 0 700 248">
  <!-- Self-contained banner: deep-slate panel + Option 3 mark + light wordmark.
       Readable on any background (GitHub light/dark, HACS light/dark themes). -->
  <defs>
    <linearGradient id="gb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#14B8C4"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="700" height="248" rx="40" fill="#0C2230"/>
  <!-- mark -->
  <g transform="translate(36 36) scale(0.34375)">
    <rect width="512" height="512" rx="122" fill="url(#gb)"/>
    <path d="M304 48 L160 288 L244 288 L208 464 L368 224 L284 224 Z" fill="#0C2230"/>
  </g>
  <!-- wordmark -->
  <g font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
    <text x="252" y="120" font-size="66" font-weight="700" fill="#F4FFFB" letter-spacing="-1">go-e <tspan fill="#34D399">+</tspan> SteVe</text>
    <text x="254" y="172" font-size="30" font-weight="500" fill="#7FA0AD" letter-spacing="6">SMART CHARGING</text>
  </g>
</svg>
